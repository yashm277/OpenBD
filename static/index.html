<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CSV Uploader - RISE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #6366f1;
        --secondary: #ec4899;
        --accent: #8b5cf6;
        --success: #10b981;
        --warning: #f59e0b;
        --bg: #fafbff;
        --card-bg: #ffffff;
        --border: #e5e7eb;
        --text: #1f2937;
        --text-secondary: #6b7280;
        --shadow: rgba(99, 102, 241, 0.1);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body { 
        font-family: 'Rajdhani', sans-serif;
        background: var(--darker);
        color: var(--text);
        min-height: 100vh;
        padding: 0;
        position: relative;
        overflow-x: hidden;
      }
      
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(circle at 20% 20%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(0, 243, 255, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 50% 50%, rgba(255, 0, 110, 0.1) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 24px;
        position: relative;
        z-index: 1;
      }
      
      h1 { 
        font-family: 'Orbitron', sans-serif;
        font-size: 3.5rem;
        font-weight: 900;
        text-align: center;
        margin-bottom: 48px;
        background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: glow 3s ease-in-out infinite alternate;
        position: relative;
      }
      
      @keyframes glow {
        from { filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.5)); }
        to { filter: drop-shadow(0 0 40px rgba(255, 0, 110, 0.8)); }
      }
      
      .card { 
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 32px;
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.6s ease-out backwards;
      }
      
      .card:nth-child(2) { animation-delay: 0.1s; }
      .card:nth-child(3) { animation-delay: 0.2s; }
      .card:nth-child(4) { animation-delay: 0.3s; }
      
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.1), transparent);
        transition: left 0.6s;
      }
      
      .card:hover::before {
        left: 100%;
      }
      
      .card:hover {
        border-color: var(--primary);
        box-shadow: 0 8px 32px rgba(0, 243, 255, 0.2);
        transform: translateY(-4px);
      }
      
      h3 {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.5rem;
        margin-bottom: 24px;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      .upload-zone {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        background: rgba(0, 243, 255, 0.03);
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
        margin-bottom: 24px;
      }
      
      .upload-zone:hover {
        border-color: var(--primary);
        background: rgba(0, 243, 255, 0.08);
        box-shadow: inset 0 0 30px rgba(0, 243, 255, 0.1);
      }
      
      .upload-icon {
        font-size: 3rem;
        margin-bottom: 16px;
        display: block;
      }
      
      input[type=file] { 
        opacity: 0;
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        cursor: pointer;
      }
      
      .button-group {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }
      
      button, .btn { 
        padding: 14px 28px;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: var(--darker);
        border: none;
        border-radius: 8px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        text-decoration: none;
        display: inline-block;
      }
      
      button::before, .btn::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }
      
      button:hover::before, .btn:hover::before {
        width: 300px;
        height: 300px;
      }
      
      button:hover, .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 243, 255, 0.4);
      }
      
      button:active, .btn:active {
        transform: translateY(0);
      }
      
      .secondary-btn {
        background: linear-gradient(135deg, var(--secondary), var(--accent));
      }
      
      #progress { 
        width: 100%;
        height: 12px;
        background: rgba(0, 243, 255, 0.1);
        border-radius: 8px;
        overflow: hidden;
        position: relative;
        margin-top: 24px;
      }
      
      #progress > div { 
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        transition: width 0.3s ease;
        position: relative;
        box-shadow: 0 0 20px var(--primary);
      }
      
      #progress > div::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        animation: shimmer 1.5s infinite;
      }
      
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      
      #statusText {
        margin-top: 16px;
        color: var(--primary);
        font-weight: 500;
        font-size: 1.1rem;
        text-align: center;
      }
      
      pre { 
        background: rgba(5, 8, 22, 0.6);
        padding: 24px;
        border-radius: 12px;
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'Courier New', monospace;
        font-size: 0.95rem;
        overflow-x: auto;
        line-height: 1.6;
      }
      
      table { 
        border-collapse: collapse;
        width: 100%;
        margin-top: 16px;
        background: rgba(5, 8, 22, 0.4);
        border-radius: 12px;
        overflow: hidden;
      }
      
      th, td { 
        border: 1px solid var(--border);
        padding: 16px;
        text-align: left;
      }
      
      th { 
        background: linear-gradient(135deg, rgba(0, 243, 255, 0.2), rgba(123, 44, 191, 0.2));
        color: var(--primary);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.9rem;
        letter-spacing: 1px;
      }
      
      td {
        color: var(--text);
      }
      
      tr:hover {
        background: rgba(0, 243, 255, 0.05);
      }
      
      em {
        color: var(--text-dim);
        font-style: italic;
      }
      
      .file-info {
        color: var(--text-dim);
        margin-top: 8px;
        font-size: 0.95rem;
      }
      
      @media (max-width: 768px) {
        h1 { font-size: 2.5rem; }
        .card { padding: 24px; }
        .button-group { flex-direction: column; }
        button, .btn { width: 100%; }
      }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: var(--darker);
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--primary), var(--accent));
        border-radius: 5px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>CSV Uploader</h1>
      
      <div class="card">
        <h3>📤 Upload Files</h3>
        <div class="upload-zone" id="uploadZone">
          <span class="upload-icon">📁</span>
          <input id="files" type="file" multiple accept=".csv" />
          <div style="font-size: 1.2rem; font-weight: 500; margin-bottom: 8px;">
            Drop CSV files here or click to browse
          </div>
          <div class="file-info">Multiple files supported</div>
            <div id="fileNames" class="file-info" style="margin-top: 16px; color: var(--primary);"></div>
            <div id="uploadedFiles" class="file-info" style="margin-top: 8px; color: var(--text-secondary);"></div>
        </div>
        
        <div class="button-group">
          <button id="uploadBtn">🚀 Upload Files</button>
          <button id="clearSelectionBtn" class="secondary-btn">🧹 Clear Selection</button>
          <button id="refreshBtn" class="secondary-btn">🔄 Refresh Status</button>
          <a id="downloadDelete" href="/download" download style="text-decoration: none;">
            <button class="btn secondary-btn">💾 Download Delete List</button>
          </a>
          <a id="downloadMaster" href="/download/master" download style="text-decoration: none;">
            <button class="btn secondary-btn">💾 Download Master DB</button>
          </a>
          <button id="resetBtn" style="background:#d9534f;color:#fff;border:none;border-radius:8px;padding:12px 18px">⛔ Reset Server</button>
        </div>
        
        <div id="progress"><div></div></div>
        <div id="statusText"></div>
      </div>

      <div class="card">
        <h3>🗑️ Delete List (soft_delete)</h3>
        <pre id="deleteList">(empty)</pre>
        <div style="margin-top:12px">
          <button id="deleteDeleteListBtn" class="secondary-btn">🗑️ Delete delete_list.csv</button>
        </div>
      </div>

      <div class="card">
        <h3>📊 Master Database Preview</h3>
        <div id="masterTable"></div>
      </div>
    </div>

    <script>
      const filesInput = document.getElementById('files')
      const uploadBtn = document.getElementById('uploadBtn')
      const refreshBtn = document.getElementById('refreshBtn')
      const progressBar = document.querySelector('#progress > div')
      const statusText = document.getElementById('statusText')
      const deleteListEl = document.getElementById('deleteList')
      const masterTable = document.getElementById('masterTable')
      const uploadZone = document.getElementById('uploadZone')
      const fileNamesEl = document.getElementById('fileNames')
      const uploadedFilesEl = document.getElementById('uploadedFiles')
      const clearSelectionBtn = document.getElementById('clearSelectionBtn')
      const resetBtn = document.getElementById('resetBtn')
      const deleteDeleteListBtn = document.getElementById('deleteDeleteListBtn')

      // File selection display
      filesInput.onchange = () => {
        const files = filesInput.files
        if (files.length > 0) {
          const names = Array.from(files).map(f => f.name).join(', ')
          fileNamesEl.innerHTML = `<strong>Selected:</strong> ${names}`
        } else {
          fileNamesEl.innerHTML = ''
        }
      }

      // Drag and drop
      uploadZone.ondragover = (e) => {
        e.preventDefault()
        uploadZone.style.borderColor = 'var(--primary)'
        uploadZone.style.background = 'rgba(0, 243, 255, 0.1)'
      }
      
      uploadZone.ondragleave = () => {
        uploadZone.style.borderColor = 'var(--border)'
        uploadZone.style.background = 'rgba(0, 243, 255, 0.03)'
      }
      
      uploadZone.ondrop = (e) => {
        e.preventDefault()
        uploadZone.style.borderColor = 'var(--border)'
        uploadZone.style.background = 'rgba(0, 243, 255, 0.03)'
        filesInput.files = e.dataTransfer.files
        filesInput.onchange()
      }

      uploadBtn.onclick = () => {
        const files = filesInput.files
        if (!files || files.length === 0) {
          statusText.innerText = '⚠️ Please select at least one CSV file'
          statusText.style.color = 'var(--secondary)'
          return
        }

        const form = new FormData()
        for (let i=0;i<files.length;i++) form.append('files', files[i])

        const xhr = new XMLHttpRequest()
        xhr.open('POST','/upload')
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100)
            progressBar.style.width = pct + '%'
            statusText.style.color = 'var(--primary)'
            statusText.innerText = `⏳ Uploading... ${pct}%` 
          }
        }
        xhr.onload = () => {
          progressBar.style.width = '100%'
          statusText.style.color = 'var(--primary)'
          statusText.innerText = '✅ Upload complete. Processing on server.'
          try {
            const resp = JSON.parse(xhr.responseText)
            statusText.innerText = '✅ ' + resp.message + ' — deleted_count: ' + resp.deleted_count
          } catch (err) { statusText.innerText = '✅ Upload finished.' }
          fetchStatus()
          
          // Reset after 3 seconds
          setTimeout(() => {
            progressBar.style.width = '0'
          }, 3000)
        }
        xhr.onerror = () => { 
          statusText.style.color = 'var(--secondary)'
          statusText.innerText = '❌ Upload failed'
        }
        xhr.send(form)
      }

      // clear selection button
      clearSelectionBtn.onclick = () => {
        filesInput.value = ''
        fileNamesEl.innerHTML = ''
        statusText.style.color = 'var(--primary)'
        statusText.innerText = 'Selection cleared'
        progressBar.style.width = '0%'
      }

      // reset server: clears master, delete_list and uploads
      resetBtn.onclick = () => {
        if (!confirm('Reset server: this will delete master_db.csv, delete_list.csv and clear uploaded files. Proceed?')) return
        fetch('/reset', {method: 'POST'})
          .then(r=>r.json())
          .then(j=>{
            statusText.innerText = 'Server reset. ' + JSON.stringify(j.result)
            fetchStatus()
          })
          .catch(e=>{ statusText.innerText = 'Reset failed'; console.error(e) })
      }

      // delete delete_list only
      deleteDeleteListBtn.onclick = () => {
        if (!confirm('Delete delete_list.csv?')) return
        fetch('/delete/delete_list', {method:'POST'})
          .then(r=>r.json())
          .then(j=>{ statusText.innerText = 'delete_list.csv deleted'; fetchStatus() })
          .catch(e=>{ statusText.innerText = 'Delete failed'; console.error(e) })
      }

      refreshBtn.onclick = fetchStatus

      function fetchStatus(){
        statusText.style.color = 'var(--primary)'
        statusText.innerText = '🔄 Fetching current status...'
        fetch('/status')
          .then(r=>r.json())
          .then(data => {
            statusText.innerText = '✅ Status loaded'
            // delete list
            if (data.delete_list && data.delete_list.length) {
              deleteListEl.innerText = data.delete_list.join('\n')
            } else deleteListEl.innerText = '(empty)'

            // master preview
            if (data.master_preview && data.master_preview.length) {
              renderMasterTable(data.master_preview)
            } else masterTable.innerHTML = '<em>(no master_db.csv yet)</em>'

            // uploaded files list
            if (data.uploaded_files && data.uploaded_files.length) {
              uploadedFilesEl.innerHTML = '<strong>Uploaded files:</strong> ' + data.uploaded_files.join(', ')
            } else uploadedFilesEl.innerHTML = '<em>(no uploaded files)</em>'
          })
          .catch(err=>{ 
            statusText.style.color = 'var(--secondary)'
            statusText.innerText = '❌ Failed to load status'
            console.error(err)
          })
      }

      function renderMasterTable(rows){
        if (!rows.length) { masterTable.innerHTML = '<em>(empty)</em>'; return }
        const cols = Object.keys(rows[0])
        let html = '<table><thead><tr>' + cols.map(c => '<th>'+c+'</th>').join('') + '</tr></thead><tbody>'
        html += rows.map(r => '<tr>' + cols.map(c => '<td>' + (r[c]===null?'':r[c]) + '</td>').join('') + '</tr>').join('')
        html += '</tbody></table>'
        masterTable.innerHTML = html
      }

      // initial load
      fetchStatus()
    </script>
  </body>
</html>
